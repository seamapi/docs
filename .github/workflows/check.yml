---
name: Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Lint
        run: npm run lint
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Typecheck
        run: npm run typecheck
  validate:
    name: Validate paths and links
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Validate SUMMARY.md paths
        run: npm run validate-paths
      - name: Validate cross-site links
        run: npm run validate-links
      - name: Validate all pages are in SUMMARY.md
        run: npm run validate-orphan-pages
      - name: Validate redirect targets
        run: npm run validate-redirects
